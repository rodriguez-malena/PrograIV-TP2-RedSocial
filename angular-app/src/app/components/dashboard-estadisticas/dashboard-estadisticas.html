<div class="dashboard">

  <div class="card">

    <h2>Estadísticas</h2>

    <form [formGroup]="formularioEstadisticas" (ngSubmit)="buscar()">

      <div class="fechas">

        <div class="form-group">
          <label>Desde</label>
          <input
            type="date"
            formControlName="desde"
            class="form-control">

        </div>

        <div class="form-group">
          <label>Hasta</label>
          <input
            type="date"
            formControlName="hasta"
            class="form-control">
        </div>

      </div>

      <button type="submit">
        Buscar
      </button>

    </form>
    
    @if (!loading) {
      <div class="chart-container loading">
        <p>Seleccioná un rango de fechas para ver las estadísticas</p>
      </div>
    }

    @if (loading) {
      <div class="card">
        <div class="chart-container">
          <canvas #chartPosts></canvas>
        </div>
      </div>
    }

    @if (loading) {
      <div class="card">
          <div class="chart-container">
            <canvas #chartComentarios></canvas>
          </div>
        </div>
    }

    @if (loading) {
      <div class="card">
        <div class="chart-container">
          <canvas #chartComentariosPost></canvas>
        </div>
      </div>
      }


</div>
