<div class="dashboard">

  <div class="card">

    <h2>Estadísticas</h2>

    <form [formGroup]="formularioEstadisticas" (ngSubmit)="buscar()">

      <div class="fechas">

        <div class="form-group">
          <label>Desde</label>
          <input
            type="date"
            formControlName="desde"
            class="form-control">

        </div>

        <div class="form-group">
          <label>Hasta</label>
          <input
            type="date"
            formControlName="hasta"
            class="form-control">
        </div>

      </div>

      <button type="submit">
        Buscar
      </button>

    </form>

    <div class="card">
      @if (loadingPosts) {
        <div class="chart-container loading">
          <p>Cargando gráfico...</p>
        </div>
    } @else{
      <div class="chart-container">
        <canvas #chartPosts></canvas>
      </div>
    }
    </div>

    <div class="card">
      @if (loadingComentarios) {
        <div class="chart-container loading">
          <p>Cargando comentarios...</p>
      </div>
      } @else {
        
        <div class="chart-container">
          <canvas #chartComentarios></canvas>
        </div>
      }
    </div>

    <div class="card">
      @if (loadingComentariosPost) {
        <div class="chart-container loading">
          <p>Cargando datos...</p>
        </div>
      } @else {

        <div class="chart-container">
          <canvas #chartComentariosPost></canvas>
        </div>
      }
    </div>

    </div>

</div>
